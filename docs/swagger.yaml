      summary: 查询视频
      tags:
      - Video
securityDefinitions:
  ApiUserID:
    description: 必填。当前登录用户ID，需与会话用户或 access_token 对应用户一致。
    in: header
    name: New-Api-User
    type: apiKey
  CookieAuth:
    description: 可选。手动传浏览器会话 Cookie，例如：session=xxx; session_2=yyy。
    in: header
    name: Cookie
    type: apiKey
swagger: "2.0"
